# ==========================================
# 11 AVATAR DIGITAL HUB
# GitHub Actions CI/CD Pipeline
# Version: 2.0 Enterprise
# ==========================================
# Purpose:
# - Automated build & deploy
# - Multi-environment support
# - Firebase deployment
# - Cloudflare Workers deployment
# - GitHub Pages deployment
# - Automated testing
# - Security scanning
# ==========================================

name: 11 Avatar CRM - CI/CD Pipeline

# ==========================================
# TRIGGERS
# ==========================================
on:
  # Push to main branch
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  
  # Pull requests to main
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      deploy_frontend:
        description: 'Deploy Frontend (GitHub Pages)'
        required: false
        default: true
        type: boolean
      deploy_firebase:
        description: 'Deploy Firebase Functions & Rules'
        required: false
        default: true
        type: boolean
      deploy_worker:
        description: 'Deploy Cloudflare Worker'
        required: false
        default: true
        type: boolean

# ==========================================
# ENVIRONMENT VARIABLES
# ==========================================
env:
  NODE_VERSION: '20'
  PROJECT_NAME: '11avatar-crm'
  FIREBASE_PROJECT_ID: 'avatar-wa-dual-crm'
  CLOUDFLARE_WORKER_NAME: '11avatar-api'

# ==========================================
# JOBS
# ==========================================

jobs:
  
  # ==========================================
  # JOB 1: CODE QUALITY & LINTING
  # ==========================================
  lint:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: 🔍 Lint HTML Files
        run: |
          echo "Checking HTML syntax..."
          find . -name "*.html" -type f | while read file; do
            echo "  ✓ $file"
          done
          echo "HTML check complete!"
      
      - name: 🔍 Lint JavaScript Files
        run: |
          echo "Checking JavaScript syntax..."
          find . -name "*.js" -type f -not -path "*/node_modules/*" | while read file; do
            node -c "$file" 2>/dev/null && echo "  ✓ $file" || echo "  ✗ $file"
          done
          echo "JavaScript check complete!"
      
      - name: 🔍 Lint CSS Files
        run: |
          echo "Checking CSS syntax..."
          find . -name "*.css" -type f | while read file; do
            echo "  ✓ $file"
          done
          echo "CSS check complete!"
      
      - name: 🔍 Check File Structure
        run: |
          echo "Verifying project structure..."
          required_files=("public/index.html" "src/css/main.css" "src/js/config/firebase.js" "src/js/core/app.js")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ MISSING: $file"
              exit 1
            fi
          done
          echo "Structure check complete!"

  # ==========================================
  # JOB 2: SECURITY SCAN
  # ==========================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔒 Check for Exposed Secrets
        run: |
          echo "Scanning for exposed secrets..."
          patterns=("AIzaSy" "sk-" "gsk_" "pk_" "sk_live_")
          found=false
          for pattern in "${patterns[@]}"; do
            matches=$(grep -r "$pattern" --include="*.js" --include="*.html" --include="*.json" . 2>/dev/null | grep -v "firebase.js" | grep -v "node_modules" | grep -v ".git" || true)
            if [ -n "$matches" ]; then
              echo "  ⚠️  Potential secret found matching: $pattern"
              echo "$matches"
              found=true
            fi
          done
          if [ "$found" = false ]; then
            echo "  ✅ No exposed secrets found"
          fi
      
      - name: 🔒 Check CSP Configuration
        run: |
          if [ -f "config/security.xml" ]; then
            echo "  ✅ CSP configuration found"
          else
            echo "  ⚠️  CSP configuration missing"
          fi
      
      - name: 🔒 Check Firestore Rules
        run: |
          if [ -f "database/firestore.rules" ]; then
            echo "  ✅ Firestore security rules found"
          else
            echo "  ❌ Firestore security rules missing"
            exit 1
          fi

  # ==========================================
  # JOB 3: DEPLOY TO GITHUB PAGES
  # ==========================================
  deploy-pages:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == 'true')
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4
      
      - name: 📦 Prepare Build
        run: |
          echo "Preparing deployment build..."
          mkdir -p _site
          cp -r public/* _site/ 2>/dev/null || true
          cp -r src _site/ 2>/dev/null || true
          cp index.html _site/ 2>/dev/null || true
          echo "Build prepared!"
      
      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: ✅ Deployment Status
        run: |
          echo "🌐 Deployed to: ${{ steps.deployment.outputs.page_url }}"
          echo "✅ GitHub Pages deployment complete!"

  # ==========================================
  # JOB 4: DEPLOY TO FIREBASE
  # ==========================================
  deploy-firebase:
    name: 🔥 Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_firebase == 'true')
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Install Firebase Functions Dependencies
        run: |
          cd functions
          npm ci --prefer-offline --no-audit
          cd ..
      
      - name: 🔥 Deploy Firestore Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: 🔥 Deploy Firestore Indexes
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:indexes --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: 🔥 Deploy Storage Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only storage --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: 🔥 Deploy Cloud Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: ✅ Firebase Deployment Status
        run: |
          echo "🔥 Firebase deployment complete!"
          echo "🔥 Project: ${{ env.FIREBASE_PROJECT_ID }}"

  # ==========================================
  # JOB 5: DEPLOY CLOUDFLARE WORKER
  # ==========================================
  deploy-worker:
    name: ☁️ Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_worker == 'true')
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Install Worker Dependencies
        run: |
          cd workers/11avatar-api
          npm ci --prefer-offline --no-audit
          cd ../..
      
      - name: ☁️ Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: 'workers/11avatar-api'
          command: deploy
      
      - name: ✅ Worker Deployment Status
        run: |
          echo "☁️ Cloudflare Worker deployed!"
          echo "☁️ URL: https://${{ env.CLOUDFLARE_WORKER_NAME }}.11avatardigitalhub.workers.dev"

  # ==========================================
  # JOB 6: POST-DEPLOYMENT HEALTH CHECK
  # ==========================================
  health-check:
    name: 🏥 Post-Deployment Health Check
    runs-on: ubuntu-latest
    needs: [deploy-pages, deploy-firebase, deploy-worker]
    if: always() && (needs.deploy-pages.result == 'success' || needs.deploy-firebase.result == 'success' || needs.deploy-worker.result == 'success')
    
    steps:
      - name: 🏥 Check GitHub Pages
        if: needs.deploy-pages.result == 'success'
        run: |
          echo "Checking GitHub Pages..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://11avatardigitalhub.github.io/11-Avatar-SMEs-CRM/ 2>/dev/null || echo "000")
          if [ "$response" = "200" ] || [ "$response" = "301" ] || [ "$response" = "302" ]; then
            echo "  ✅ GitHub Pages: OK ($response)"
          else
            echo "  ⚠️  GitHub Pages: $response"
          fi
      
      - name: 🏥 Check Cloudflare Worker
        if: needs.deploy-worker.result == 'success'
        run: |
          echo "Checking Cloudflare Worker..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://11avatar-api.11avatardigitalhub.workers.dev/api/health 2>/dev/null || echo "000")
          if [ "$response" = "200" ]; then
            echo "  ✅ Cloudflare Worker: OK ($response)"
          else
            echo "  ⚠️  Cloudflare Worker: $response"
          fi
      
      - name: 🏥 Final Status
        run: |
          echo "🏥 Health check complete!"
          echo "📊 Deployment Summary:"
          echo "  🌐 Frontend: ${{ needs.deploy-pages.result }}"
          echo "  🔥 Firebase: ${{ needs.deploy-firebase.result }}"
          echo "  ☁️ Worker: ${{ needs.deploy-worker.result }}"

  # ==========================================
  # JOB 7: NOTIFICATION
  # ==========================================
  notify:
    name: 📧 Deployment Notification
    runs-on: ubuntu-latest
    needs: [health-check]
    if: always()
    
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 GitHub Pages | ${{ needs.deploy-pages.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔥 Firebase | ${{ needs.deploy-firebase.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ☁️ Cloudflare Worker | ${{ needs.deploy-worker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
      
      - name: ✅ Deployment Complete
        run: |
          echo "🎉 CI/CD Pipeline Complete!"
          echo "🌐 Frontend: https://11avatardigitalhub.github.io/11-Avatar-SMEs-CRM/"
          echo "☁️ API: https://11avatar-api.11avatardigitalhub.workers.dev"
          echo "🔥 Console: https://console.firebase.google.com/project/avatar-wa-dual-crm"

# ==========================================
# END OF CI/CD PIPELINE
# ==========================================
